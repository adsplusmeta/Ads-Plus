version: '3.8'

services:
  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    container_name: app-backend
    restart: unless-stopped
    env_file: ../backend/.env
    ports:
      - "127.0.0.1:5000:5000"    # solo localhost — Nginx hace de proxy público
    volumes:
      - backend-logs:/app/logs
    networks:
      - app-internal
    depends_on:
      mongodb:
        condition: service_healthy
    # Hardening del contenedor
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    read_only: true
    tmpfs:
      - /tmp:size=64m,mode=1777
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: '0.5'

  mongodb:
    image: mongo:7.0
    container_name: app-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD}
      MONGO_INITDB_DATABASE: ${MONGO_DATABASE}
    volumes:
      - mongodb-data:/data/db
      - ../database/backups:/backups
    networks:
      - app-internal
    # MongoDB NO expuesto al exterior — solo accesible internamente
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  nginx:
    image: nginx:1.25-alpine
    container_name: app-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ../docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ../security/certificates:/etc/nginx/ssl:ro
      - nginx-logs:/var/log/nginx
    networks:
      - app-internal
      - app-public
    depends_on:
      - backend
    security_opt:
      - no-new-privileges:true

  prometheus:
    image: prom/prometheus:v2.48.0
    container_name: app-prometheus
    restart: unless-stopped
    volumes:
      - ../monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    networks:
      - app-internal
    ports:
      - "127.0.0.1:9090:9090"    # solo localhost

  grafana:
    image: grafana/grafana:10.2.0
    container_name: app-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-changeme}
      GF_USERS_ALLOW_SIGN_UP: 'false'
      GF_AUTH_ANONYMOUS_ENABLED: 'false'
    volumes:
      - grafana-data:/var/lib/grafana
      - ../monitoring/grafana:/etc/grafana/provisioning
    networks:
      - app-internal
    ports:
      - "127.0.0.1:3000:3000"    # solo localhost
    depends_on:
      - prometheus

volumes:
  mongodb-data:
  backend-logs:
  nginx-logs:
  prometheus-data:
  grafana-data:

networks:
  app-internal:
    driver: bridge
    internal: true    # sin acceso directo a internet
  app-public:
    driver: bridge

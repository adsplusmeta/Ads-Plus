global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

rule_files: []

scrape_configs:
  - job_name: 'api-backend'
    static_configs:
      - targets: ['backend:5000']
    metrics_path: '/api/metrics'
    scheme: http
    # En producción usar HTTPS y basic_auth o bearer_token

  - job_name: 'mongodb'
    static_configs:
      - targets: ['mongodb-exporter:9216']

  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']
